<style>
  .sd-quiz-wrap {
    font-family: 'Sarabun', sans-serif;
    max-width: 700px;
    margin: 0 auto;
    padding: 0 0 2rem;
    color: #1a1a2e;
  }
  .sd-intro {
    background: #f0faf5;
    border-left: 4px solid #1d9e75;
    border-radius: 0 10px 10px 0;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 15px;
    color: #0f6e56;
    line-height: 1.7;
  }
  .sd-q-card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .sd-q-num {
    font-size: 12px;
    color: #94a3b8;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .sd-q-text {
    font-size: 17px;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .sd-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 480px) {
    .sd-choices { grid-template-columns: 1fr; }
  }
  .sd-choice-btn {
    background: #f8fafc;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 15px;
    font-family: 'Sarabun', sans-serif;
    color: #334155;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
    line-height: 1.5;
  }
  .sd-choice-btn:hover:not(:disabled) {
    background: #e8f5f0;
    border-color: #1d9e75;
    color: #0f6e56;
  }
  .sd-choice-btn.correct {
    background: #d1fae5;
    border-color: #059669;
    color: #065f46;
    font-weight: 600;
  }
  .sd-choice-btn.wrong {
    background: #fee2e2;
    border-color: #dc2626;
    color: #7f1d1d;
  }
  .sd-choice-btn.show-correct {
    background: #d1fae5;
    border-color: #059669;
    color: #065f46;
  }
  .sd-choice-btn:disabled { cursor: default; }
  .sd-explain {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: #fffbeb;
    border-left: 3px solid #f59e0b;
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    color: #78350f;
    line-height: 1.7;
  }
  .sd-explain.show { display: block; }
  .sd-explain strong { color: #92400e; }
  .sd-score-area {
    background: linear-gradient(135deg, #0f6e56 0%, #1d9e75 100%);
    border-radius: 16px;
    padding: 28px 24px;
    margin-top: 24px;
    text-align: center;
    color: #ffffff;
  }
  .sd-score-label { font-size: 14px; opacity: 0.85; margin-bottom: 6px; }
  .sd-score-num { font-size: 48px; font-weight: 700; margin: 4px 0 8px; letter-spacing: -1px; }
  .sd-score-msg { font-size: 15px; opacity: 0.9; margin-bottom: 16px; }
  .sd-dots { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .sd-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .sd-dot.c { background: #ffffff; }
  .sd-dot.w { background: #fca5a5; }
  .sd-restart-btn {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 15px;
    font-family: 'Sarabun', sans-serif;
    color: #ffffff;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sd-restart-btn:hover { background: rgba(255,255,255,0.25); }
  .sd-cta {
    margin-top: 20px;
    padding: 16px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 14px;
    opacity: 0.9;
    line-height: 1.7;
  }
  .sd-cta a { color: #ffffff; font-weight: 700; text-decoration: underline; }
</style>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">

<div class="sd-quiz-wrap">

  <div class="sd-intro">
    📝 แบบฝึกหัดนี้มี <strong>10 ข้อ</strong> — เรื่องสมการเชิงเส้นตัวแปรเดียว ระดับ ม.1<br>
    เลือกคำตอบที่คิดว่าถูก แล้วดูเฉลยพร้อมคำอธิบายได้ทันที <strong>ไม่ต้องสมัครสมาชิก</strong>
  </div>

  <div id="sd-quiz-container"></div>

  <div id="sd-score-area" class="sd-score-area" style="display:none;">
    <div class="sd-score-label">คะแนนของคุณ</div>
    <div class="sd-score-num" id="sd-score-display"></div>
    <div class="sd-score-msg" id="sd-score-msg"></div>
    <div class="sd-dots" id="sd-dots"></div>
    <button class="sd-restart-btn" onclick="sdRestart()">🔄 ทำใหม่อีกครั้ง</button>
    <div class="sd-cta">
      อยากเข้าใจลึกขึ้น? <a href="https://sorndee.co/course">หาติวเตอร์คณิตศาสตร์</a> ที่สอนดีได้เลย ✨
    </div>
  </div>

</div>

<script>
(function(){
  var qs = [
    {
      q: "ถ้า x + 5 = 12 แล้ว x มีค่าเท่าไร?",
      choices: ["5", "7", "8", "17"],
      ans: 1,
      exp: "<strong>วิธีทำ:</strong> นำ 5 ไปลบออกจากทั้งสองข้าง → x = 12 − 5 = <strong>7</strong>"
    },
    {
      q: "แก้สมการ 3x = 18 จะได้ x เท่ากับเท่าไร?",
      choices: ["3", "5", "6", "54"],
      ans: 2,
      exp: "<strong>วิธีทำ:</strong> หารทั้งสองข้างด้วย 3 → x = 18 ÷ 3 = <strong>6</strong>"
    },
    {
      q: "ถ้า x − 4 = 9 แล้ว x มีค่าเท่าไร?",
      choices: ["5", "13", "14", "4"],
      ans: 1,
      exp: "<strong>วิธีทำ:</strong> บวก 4 ทั้งสองข้าง → x = 9 + 4 = <strong>13</strong>"
    },
    {
      q: "สมการ 2x + 3 = 11 มีคำตอบคือ x เท่ากับเท่าไร?",
      choices: ["4", "5", "7", "3"],
      ans: 0,
      exp: "<strong>วิธีทำ:</strong> ลบ 3 ทั้งสองข้าง → 2x = 8 แล้วหารด้วย 2 → x = <strong>4</strong>"
    },
    {
      q: "ถ้า x/3 = 5 แล้ว x มีค่าเท่าไร?",
      choices: ["8", "2", "15", "5"],
      ans: 2,
      exp: "<strong>วิธีทำ:</strong> คูณ 3 ทั้งสองข้าง → x = 5 × 3 = <strong>15</strong>"
    },
    {
      q: "แก้สมการ 5x − 10 = 20 จะได้ x เท่ากับเท่าไร?",
      choices: ["2", "6", "4", "10"],
      ans: 1,
      exp: "<strong>วิธีทำ:</strong> บวก 10 ทั้งสองข้าง → 5x = 30 แล้วหารด้วย 5 → x = <strong>6</strong>"
    },
    {
      q: "ถ้า 4x + 1 = 17 แล้ว x มีค่าเท่าไร?",
      choices: ["3", "4", "5", "16"],
      ans: 1,
      exp: "<strong>วิธีทำ:</strong> ลบ 1 ทั้งสองข้าง → 4x = 16 แล้วหารด้วย 4 → x = <strong>4</strong>"
    },
    {
      q: "สมการ 2(x + 3) = 14 มีคำตอบคือ x เท่าไร?",
      choices: ["4", "7", "8", "5"],
      ans: 0,
      exp: "<strong>วิธีทำ:</strong> กระจาย → 2x + 6 = 14 ลบ 6 → 2x = 8 หารด้วย 2 → x = <strong>4</strong>"
    },
    {
      q: "ถ้า 3x − 7 = 2 แล้ว x มีค่าเท่าไร?",
      choices: ["1", "3", "4", "5"],
      ans: 1,
      exp: "<strong>วิธีทำ:</strong> บวก 7 ทั้งสองข้าง → 3x = 9 แล้วหารด้วย 3 → x = <strong>3</strong>"
    },
    {
      q: "สมการ x/2 + 4 = 9 มีคำตอบคือ x เท่ากับเท่าไร?",
      choices: ["5", "10", "13", "2"],
      ans: 1,
      exp: "<strong>วิธีทำ:</strong> ลบ 4 ทั้งสองข้าง → x/2 = 5 แล้วคูณ 2 → x = <strong>10</strong>"
    }
  ];

  var answered = new Array(qs.length).fill(null);
  var labels = ['ก', 'ข', 'ค', 'ง'];

  function render() {
    var c = document.getElementById('sd-quiz-container');
    c.innerHTML = '';
    qs.forEach(function(q, i) {
      var card = document.createElement('div');
      card.className = 'sd-q-card';
      var choicesHtml = q.choices.map(function(ch, ci) {
        return '<button class="sd-choice-btn" onclick="sdPick(' + i + ',' + ci + ')">' + labels[ci] + '. ' + ch + '</button>';
      }).join('');
      card.innerHTML =
        '<div class="sd-q-num">ข้อ ' + (i+1) + ' / ' + qs.length + '</div>' +
        '<div class="sd-q-text">' + q.q + '</div>' +
        '<div class="sd-choices" id="sd-choices-' + i + '">' + choicesHtml + '</div>' +
        '<div class="sd-explain" id="sd-exp-' + i + '">' + q.exp + '</div>';
      c.appendChild(card);
      if (answered[i] !== null) sdRestoreQ(i);
    });
    sdUpdateScore();
  }

  window.sdPick = function(qi, ci) {
    if (answered[qi] !== null) return;
    answered[qi] = ci;
    sdRestoreQ(qi);
    sdUpdateScore();
  };

  function sdRestoreQ(qi) {
    var q = qs[qi];
    var btns = document.querySelectorAll('#sd-choices-' + qi + ' .sd-choice-btn');
    var chosen = answered[qi];
    btns.forEach(function(b, ci) {
      b.disabled = true;
      if (ci === q.ans) b.classList.add('show-correct');
      if (ci === chosen && chosen !== q.ans) b.classList.add('wrong');
      if (ci === chosen && chosen === q.ans) { b.classList.remove('show-correct'); b.classList.add('correct'); }
    });
    document.getElementById('sd-exp-' + qi).classList.add('show');
  }

  function sdUpdateScore() {
    var done = answered.filter(function(a){ return a !== null; }).length;
    var correct = answered.filter(function(a, i){ return a === qs[i].ans; }).length;
    if (done === qs.length) {
      var sa = document.getElementById('sd-score-area');
      sa.style.display = 'block';
      document.getElementById('sd-score-display').textContent = correct + ' / ' + qs.length;
      var pct = Math.round(correct / qs.length * 100);
      var msg = pct >= 90 ? '🏆 ยอดเยี่ยมมาก! คุณเชี่ยวชาญสมการเชิงเส้นแล้ว'
              : pct >= 70 ? '👍 ดีมาก! ลองทบทวนข้อที่ผิดอีกครั้งนะ'
              : pct >= 50 ? '💪 พอใช้ได้ อ่านคำอธิบายแล้วลองทำใหม่อีกรอบ'
              : '📖 ไม่ต้องท้อ! ลองดูคำอธิบายแต่ละข้อแล้วเริ่มใหม่ได้เลย';
      document.getElementById('sd-score-msg').textContent = msg;
      var dots = document.getElementById('sd-dots');
      dots.innerHTML = answered.map(function(a, i){
        return '<div class="sd-dot ' + (a === qs[i].ans ? 'c' : 'w') + '"></div>';
      }).join('');
      sa.scrollIntoView({behavior:'smooth', block:'nearest'});
    }
  }

  window.sdRestart = function() {
    answered = new Array(qs.length).fill(null);
    document.getElementById('sd-score-area').style.display = 'none';
    render();
    document.getElementById('sd-quiz-container').scrollIntoView({behavior:'smooth', block:'start'});
  };

  render();
})();
</script>
